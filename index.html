<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ウィズ 社員名簿</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    /* メインカラー：落ち着いた青緑（信頼感・清潔感） */
    --navy:#2C5F56;
    --navy-dark:#1E453D;
    /* 淡いミントティント（縞模様・ハイライト用） */
    --blue-light:#E3EEEA;
    /* アクセント（見出しの下線・タグなど、控えめに使用） */
    --gold:#B8823D;
    /* 本文・補足テキストは温かみのある濃グレーに */
    --ink:#2A2823;
    --muted:#6B6459;
    --ok:#2F7A4F;
    --warn:#B3651A;
    --err:#A9542E;
    /* 背景は紙のような温かみのあるオフホワイトに */
    --bg:#F7F3EC;
    --card:#FFFFFF;
    --border:#E4DFD5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Zen Kaku Gothic New","游ゴシック","Yu Gothic","Hiragino Kaku Gothic ProN",sans-serif;
    background:var(--bg);
    color:var(--ink);
  }
  .hidden{display:none !important;}

  /* ログイン画面 */
  #loginView{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:16px;
  }
  .login-card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:36px 32px;
    width:100%;
    max-width:360px;
    box-shadow:0 2px 12px rgba(0,0,0,0.05);
  }
  .login-card h1{
    font-size:18px;
    font-weight:700;
    color:var(--navy);
    margin:0 0 24px;
    text-align:center;
    letter-spacing:.02em;
  }
  .field{ margin-bottom:14px; }
  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:5px;
  }
  .field input{
    width:100%;
    padding:10px 12px;
    font-size:14px;
    border:1px solid var(--border);
    border-radius:6px;
    font-family:inherit;
  }
  #loginBtn{
    width:100%;
    padding:12px;
    font-size:14px;
    font-weight:700;
    color:#fff;
    background:var(--navy);
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:8px;
  }
  #loginBtn:hover{ background:var(--navy-dark); }
  #loginError{
    color:var(--warn);
    font-size:12px;
    margin-top:10px;
    min-height:16px;
    text-align:center;
  }

  /* アプリ本体 */
  header.appbar{
    background:var(--navy);
    color:#fff;
    padding:14px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    position:relative;
  }
  header.appbar::before{
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:3px;
    background:linear-gradient(90deg, var(--gold), var(--navy) 65%);
  }
  header.appbar h1{
    font-size:17px;
    margin:0;
    font-weight:700;
    letter-spacing:.03em;
  }
  .user-info{ font-size:12px; opacity:.85; display:flex; align-items:center; gap:12px; }
  #logoutBtn{
    background:rgba(255,255,255,0.15);
    color:#fff;
    border:1px solid rgba(255,255,255,0.35);
    padding:6px 12px;
    border-radius:6px;
    font-size:12px;
    cursor:pointer;
  }
  #logoutBtn:hover{ background:rgba(255,255,255,0.25); }

  main{ max-width:960px; margin:0 auto; padding:24px 16px 80px; }

  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px 22px;
    margin-bottom:20px;
    box-shadow:0 1px 3px rgba(42,40,35,0.05), 0 1px 2px rgba(42,40,35,0.04);
  }
  .card h2{
    font-size:15px;
    font-weight:700;
    color:var(--navy);
    margin:0 0 14px;
    letter-spacing:.02em;
  }

  .tabs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px; }
  .facility-select-row{
    display:flex;
    align-items:center;
    gap:8px;
    margin-bottom:16px;
  }
  .facility-select-row label{ font-size:13px; color:var(--muted); }
  .facility-select-row select{
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    padding:8px 12px;
    border:1px solid var(--border);
    border-radius:6px;
    background:#fff;
    color:var(--navy);
    max-width:280px;
  }
  .tab-btn{
    padding:8px 14px;
    font-size:13px;
    border:1px solid var(--border);
    background:#fff;
    border-radius:20px;
    cursor:pointer;
    color:var(--ink);
  }
  .tab-btn.active{
    background:var(--navy);
    color:#fff;
    border-color:var(--navy);
  }

  .file-row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:8px;}
  input[type=file]{ font-size:13px; }
  select{
    font-family:inherit;
    font-size:14px;
    padding:8px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    background:#fff;
    max-width:100%;
  }
  .hint{ font-size:12px; color:var(--muted); margin-top:6px; }

  button.primary{
    padding:10px 18px;
    font-size:14px;
    font-weight:700;
    letter-spacing:.02em;
    color:#fff;
    background:var(--navy);
    border:none;
    border-radius:9px;
    cursor:pointer;
  }
  button.primary:disabled{ background:#CBC3B2; cursor:not-allowed; }
  button.primary:not(:disabled):hover{ background:var(--navy-dark); }

  button.secondary{
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    color:var(--navy);
    background:#fff;
    border:1px solid var(--navy);
    border-radius:9px;
    cursor:pointer;
  }
  button.secondary:hover{ background:var(--blue-light); }

  table.result, table.roster{
    width:100%;
    border-collapse:collapse;
    font-size:13px;
    margin-top:10px;
  }
  table.result th, table.result td, table.roster th, table.roster td{
    text-align:left;
    padding:7px 8px;
    border-bottom:1px solid var(--border);
    white-space:nowrap;
  }
  table.result th, table.roster th{
    color:var(--muted);
    font-weight:700;
    font-size:12px;
    background:#F2EDE2;
  }
  table.roster tbody tr:nth-child(odd){ background:#FBF9F4; }

  @media (max-width:480px){
    main{ padding-left:10px; padding-right:10px; }
    .card{ padding:16px 14px; }
    table.roster th, table.roster td{
      padding:6px 4px;
      font-size:11.5px;
      white-space:normal;
      word-break:break-word;
    }
  }

  .log-title{ font-weight:700; font-size:14px; margin-top:16px; }
  .log-title.ok{ color:var(--ok); }
  .log-title.warn{ color:var(--warn); }
  ul.warnings{ margin:8px 0 0; padding-left:18px; font-size:13px; color:var(--warn); }

  .toolbar{ display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px; margin-bottom:8px; }
  .count-badge{ font-size:12px; color:var(--muted); }
  .headcount-summary{
    font-size:13px;
    color:var(--muted);
    margin-bottom:12px;
  }
  .alert-list{
    list-style:none;
    margin:0;
    padding:0;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .alert-list li{
    font-size:13px;
    color:var(--ink);
    background:#FBF6EC;
    border:1px solid #EBD9B4;
    border-radius:8px;
    padding:9px 12px;
  }
  .alert-list li.alert-urgent{
    background:#FBEEDD;
    border-color:var(--warn);
    font-weight:600;
  }
  .roster-filters{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:10px;
  }
  .roster-filters select{
    font-family:inherit;
    font-size:13px;
    padding:6px 10px;
    border:1px solid var(--border);
    border-radius:6px;
    background:#fff;
    color:var(--ink);
  }
  .toolbar-inline{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:8px;
    margin-top:10px;
  }
  .show-retired-toggle{
    font-size:12px;
    color:var(--muted);
    display:flex;
    align-items:center;
    gap:6px;
    cursor:pointer;
  }
  tr.retired-row{ opacity:.6; }
  .retired-badge{
    display:inline-block;
    margin-left:8px;
    font-size:11px;
    color:var(--muted);
    background:#EDE8DC;
    border-radius:10px;
    padding:2px 8px;
  }
  .updated-badge{
    display:inline-block;
    margin-left:8px;
    font-size:11px;
    font-weight:700;
    color:#fff;
    background:var(--gold);
    border-radius:10px;
    padding:2px 8px;
  }
  .last-updated-info{
    grid-column:1 / -1;
    font-size:12px;
    color:var(--muted);
    background:#FBF9F4;
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 12px;
    margin-bottom:4px;
  }
  .empty-msg{ font-size:13px; color:var(--muted); padding:20px 0; text-align:center; }

  /* 編集モーダル */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(20,25,35,0.45);
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    z-index:100;
  }
  .modal{
    background:#fff;
    border-radius:12px;
    padding:24px;
    width:100%;
    max-width:680px;
    max-height:90vh;
    overflow-y:auto;
    overscroll-behavior:contain;
  }
  .modal h2{ font-size:16px; color:var(--navy); margin:0 0 16px; }
  .modal-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px 16px;
  }
  @media (max-width:480px){
    .modal-grid{ grid-template-columns:1fr; }
    .modal{ padding:20px 16px; max-width:100%; }
  }
  .qual-pair-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px 16px;
  }
  .qual-pair-grid-3{ grid-template-columns:1.4fr 1fr 1fr; }
  @media (max-width:480px){
    .qual-pair-grid{ grid-template-columns:1fr; }
    .qual-pair-grid-3{ grid-template-columns:1fr; }
  }
  .modal-grid .field.full{ grid-column:1 / -1; }
  .modal-grid label{ display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .birthdate-row{ display:flex; align-items:center; gap:8px; }
  .birthdate-row input{ flex:1; }
  .age-display{ font-size:13px; color:var(--muted); white-space:nowrap; }
  .modal-grid input, .modal-grid select, .modal-grid textarea{
    width:100%;
    padding:8px 10px;
    font-size:13px;
    border:1px solid var(--border);
    border-radius:6px;
    font-family:inherit;
  }
  .modal-grid textarea{ min-height:56px; resize:vertical; }
  .modal-actions{
    display:flex; align-items:center; gap:10px;
    margin-top:20px;
  }
  button.danger{
    padding:9px 16px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    background:#fff;
    border:1px solid var(--border);
    border-radius:8px;
    cursor:pointer;
  }
  button.danger:hover{ background:#F1ECE2; color:var(--ink); }
  #modalError{ color:var(--warn); font-size:12px; margin-top:10px; }
  .edit-btn{
    padding:4px 10px;
    font-size:12px;
    color:var(--navy);
    background:#fff;
    border:1px solid var(--navy);
    border-radius:14px;
    cursor:pointer;
  }
  .edit-btn:hover{ background:var(--blue-light); }
  .name-link{
    color:var(--navy);
    font-weight:700;
    cursor:pointer;
    text-decoration:underline;
    text-decoration-color:transparent;
  }
  .name-link:hover{ text-decoration-color:var(--navy); }

  .modal-tabs{ display:flex; gap:6px; margin-bottom:16px; border-bottom:1px solid var(--border); }
  .modal-tab-btn{
    padding:8px 16px;
    font-size:13px;
    font-weight:600;
    color:var(--muted);
    background:none;
    border:none;
    border-bottom:2px solid transparent;
    cursor:pointer;
    margin-bottom:-1px;
  }
  .modal-tab-btn.active{
    color:var(--navy);
    border-bottom-color:var(--navy);
  }
  .salary-total{
    font-size:20px;
    font-weight:700;
    color:var(--navy);
    padding:10px 12px;
    background:var(--blue-light);
    border-radius:6px;
  }
  .salary-hint{ font-size:12px; color:var(--muted); margin:-6px 0 12px; grid-column:1 / -1; }
  .salary-current{
    grid-column:1 / -1;
    font-size:14px;
    color:var(--ink);
    background:#FBF9F4;
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 14px;
    margin-bottom:4px;
  }
  #addSalaryHistoryBtn{ grid-column:1 / -1; width:100%; }
  .salary-history-title{
    grid-column:1 / -1;
    font-size:13px;
    color:var(--navy);
    margin:8px 0 4px;
  }
  table.salary-history-table{
    grid-column:1 / -1;
    width:100%;
    border-collapse:collapse;
    font-size:12px;
  }
  table.salary-history-table th, table.salary-history-table td{
    text-align:left;
    padding:6px 8px;
    border-bottom:1px solid var(--border);
    vertical-align:top;
  }
  table.salary-history-table th{ color:var(--muted); font-weight:600; }
  .hist-breakdown{ color:var(--muted); }

  .file-row-inline{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .cert-link{
    color:var(--navy);
    font-weight:600;
    cursor:pointer;
    font-size:13px;
  }
  .cert-link:hover{ text-decoration:underline; }
  .cert-delete-btn{
    font-size:12px;
    padding:5px 10px;
    color:var(--muted);
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    cursor:pointer;
  }
  .cert-delete-btn:hover{ background:#F1ECE2; color:var(--ink); }
  .cert-file-input{ font-size:12px; max-width:220px; }
  .cert-disabled-hint{ font-size:12px; color:var(--muted); }
</style>
</head>
<body>

<div id="loginView">
  <div class="login-card">
    <h1>ウィズ 社員名簿 ログイン</h1>
    <div class="field">
      <label>メールアドレス</label>
      <input type="email" id="loginEmail" autocomplete="username">
    </div>
    <div class="field">
      <label>パスワード</label>
      <input type="password" id="loginPassword" autocomplete="current-password">
    </div>
    <button id="loginBtn">ログイン</button>
    <div id="loginError"></div>
  </div>
</div>

<div id="appView" class="hidden">
  <header class="appbar">
    <h1>ウィズ 社員名簿</h1>
    <div class="user-info">
      <span id="userEmail"></span>
      <button id="logoutBtn">ログアウト</button>
    </div>
  </header>

  <main>
    <div class="card hidden" id="alertCard">
      <h2>お知らせ</h2>
      <div id="alertArea"></div>
    </div>

    <div class="card">
      <h2>入社連絡票を反映</h2>
      <div class="file-row">
        <select id="facilitySelectUpload"></select>
        <input type="file" id="formFile" accept=".xlsx">
        <button class="primary" id="uploadBtn" disabled>反映する</button>
      </div>
      <div class="hint">1シート＝1名の入社連絡票（.xlsx）に対応しています。複数名を一括で反映できます。マイナンバー・基礎年金番号などは反映しません。</div>
      <div id="uploadLog"></div>
    </div>

    <div class="card">
      <div class="toolbar">
        <h2 style="margin:0;">社員一覧</h2>
        <div style="display:flex; gap:8px; align-items:center;">
          <button class="secondary" id="addBtn">＋ 新規追加</button>
          <button class="secondary" id="refreshBtn">再読み込み</button>
          <button class="secondary" id="exportBtn">Excelでダウンロード</button>
        </div>
      </div>
      <div class="facility-select-row">
        <label for="facilitySelectView">所属：</label>
        <select id="facilitySelectView"></select>
      </div>
      <div class="headcount-summary" id="headcountSummary"></div>
      <div id="rosterArea"></div>
    </div>
  </main>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
  <div class="modal">
    <h2 id="modalTitle">社員情報を編集</h2>
    <div class="modal-tabs" id="modalTabs">
      <button type="button" class="modal-tab-btn active" data-tab="basic">基本情報</button>
      <button type="button" class="modal-tab-btn" data-tab="salary">給与</button>
    </div>
    <div class="modal-grid" id="modalGridBasic"></div>
    <div class="modal-grid hidden" id="modalGridSalary"></div>
    <div class="modal-actions">
      <button class="danger hidden" id="modalDeleteBtn">削除</button>
      <div style="flex:1;"></div>
      <button class="secondary" id="modalCancelBtn">キャンセル</button>
      <button class="primary" id="modalSaveBtn">保存</button>
    </div>
    <div id="modalError"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://splmrpfagtyrfloltwtl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_7S56o9cnVJ1Il5m_qmXhVQ_5_AN3Hmb';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const FACILITIES = ['ナーシングホーム寿々デンタル中村', '子都菜', 'おきむら家'];
let currentFacility = FACILITIES[0];
let qualificationOptions = [];
let currentUserEmail = '';
let canViewSalary = false;
let allowedFacilities = [];
let displayNames = {};

async function loadQualificationOptions(){
  const { data, error } = await sb.from('qualification_options').select('name').order('name');
  if (!error && data) qualificationOptions = data.map(d => d.name);
}

async function loadDisplayNames(){
  const { data, error } = await sb.from('staff_display_names').select('email, display_name');
  if (!error && data){
    displayNames = {};
    data.forEach(row => { displayNames[row.email] = row.display_name; });
  }
}

function displayNameFor(email){
  if (!email) return '不明';
  return displayNames[email] || email;
}

async function loadPermissions(email){
  const { data, error } = await sb.from('staff_permissions').select('can_view_salary, allowed_facilities').eq('email', email).maybeSingle();
  canViewSalary = !error && data ? !!data.can_view_salary : false;
  allowedFacilities = (!error && data && Array.isArray(data.allowed_facilities))
    ? FACILITIES.filter(f => data.allowed_facilities.includes(f))
    : [];
  const salaryTabBtn = document.querySelector('.modal-tab-btn[data-tab="salary"]');
  if (salaryTabBtn) salaryTabBtn.classList.toggle('hidden', !canViewSalary);
}

/* ---------- 認証まわり ---------- */
const loginView = document.getElementById('loginView');
const appView = document.getElementById('appView');
const loginBtn = document.getElementById('loginBtn');
const loginError = document.getElementById('loginError');
const logoutBtn = document.getElementById('logoutBtn');
const userEmailEl = document.getElementById('userEmail');

async function checkSession(){
  const { data:{ session } } = await sb.auth.getSession();
  if (session){ showApp(session.user.email); } else { showLogin(); }
}

function showLogin(){
  loginView.classList.remove('hidden');
  appView.classList.add('hidden');
}

async function showApp(email){
  loginView.classList.add('hidden');
  appView.classList.remove('hidden');
  userEmailEl.textContent = email;
  currentUserEmail = email;
  await loadPermissions(email);
  initFacilityUI();
  if (currentFacility) loadRoster(currentFacility);
  loadQualificationOptions();
  loadDisplayNames();
}

loginBtn.addEventListener('click', async () => {
  loginError.textContent = '';
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!email || !password){ loginError.textContent = 'メールアドレスとパスワードを入力してください'; return; }
  loginBtn.disabled = true; loginBtn.textContent = 'ログイン中...';
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  loginBtn.disabled = false; loginBtn.textContent = 'ログイン';
  if (error){ loginError.textContent = 'ログインできませんでした：' + error.message; return; }
  showApp(data.user.email);
});

logoutBtn.addEventListener('click', async () => {
  await sb.auth.signOut();
  showLogin();
});

checkSession();

/* ---------- 施設タブ・アップロード先セレクト ---------- */
function initFacilityUI(){
  const viewSelect = document.getElementById('facilitySelectView');
  const uploadSelect = document.getElementById('facilitySelectUpload');

  if (!allowedFacilities.length){
    viewSelect.innerHTML = '';
    uploadSelect.innerHTML = '';
    currentFacility = null;
    document.getElementById('rosterArea').innerHTML =
      '<div class="empty-msg">アクセスできる施設がありません。管理者にお問い合わせください。</div>';
    return;
  }

  if (!allowedFacilities.includes(currentFacility)) currentFacility = allowedFacilities[0];

/* ---------- 入社連絡票の解析（従来ロジック） ---------- */
function hwKanaToFullWidth(str){
  if (!str) return str;
  const dakuten = {
    'ｶﾞ':'ガ','ｷﾞ':'ギ','ｸﾞ':'グ','ｹﾞ':'ゲ','ｺﾞ':'ゴ',
    'ｻﾞ':'ザ','ｼﾞ':'ジ','ｽﾞ':'ズ','ｾﾞ':'ゼ','ｿﾞ':'ゾ',
    'ﾀﾞ':'ダ','ﾁﾞ':'ヂ','ﾂﾞ':'ヅ','ﾃﾞ':'デ','ﾄﾞ':'ド',
    'ﾊﾞ':'バ','ﾋﾞ':'ビ','ﾌﾞ':'ブ','ﾍﾞ':'ベ','ﾎﾞ':'ボ',
    'ﾊﾟ':'パ','ﾋﾟ':'ピ','ﾌﾟ':'プ','ﾍﾟ':'ペ','ﾎﾟ':'ポ',
    'ｳﾞ':'ヴ'
  };
  let s = str;
  Object.keys(dakuten).forEach(k => { s = s.split(k).join(dakuten[k]); });
  const han = "ｦｧｨｩｪｫｬｭｮｯｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ｡｢｣､･ｰ";
  const zen = "ヲァィゥェォャュョッアイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン。「」、・ー";
  let out = '';
  for (const ch of s){
    const idx = han.indexOf(ch);
    out += idx >= 0 ? zen[idx] : ch;
  }
  return out;
}

function sheetToAoa(ws){
  const aoa = [];
  ws.eachRow({ includeEmpty:true }, (row, rowNumber) => {
    const arr = [];
    row.eachCell({ includeEmpty:true }, (cell, colNumber) => { arr[colNumber - 1] = cell.value; });
    aoa[rowNumber - 1] = arr;
  });
  return aoa;
}

function findLabelRow(aoa, labelSubstr){
  for (let r = 0; r < aoa.length; r++){
    const row = aoa[r];
    if (!row) continue;
    const cell = row[1]; // 列Aが空のため列Bがindex1
    if (typeof cell === 'string' && cell.replace(/\s+/g,'').includes(labelSubstr)) return r;
  }
  return -1;
}

function toDate(v){ return v instanceof Date ? v : null; }
function toISODate(d){ return d instanceof Date ? d.toISOString().slice(0,10) : null; }
function fmtDate(v){
  const d = (typeof v === 'string') ? new Date(v) : v;
  if (!(d instanceof Date) || isNaN(d)) return '';
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  return `${y}/${m}/${day}`;
}

function parseEmployeeSheet(ws, warnings, sheetLabel){
  const aoa = sheetToAoa(ws);
  const get = (labelSubstr, col=2) => {
    const r = findLabelRow(aoa, labelSubstr);
    if (r === -1){ warnings.push(`${sheetLabel}：「${labelSubstr}」の項目が見つかりませんでした`); return null; }
    return aoa[r][col];
  };
  const no = get('社員No');
  const name = get('氏名');
  const kanaHW = get('ｼﾒｲ');
  const genderRaw = get('性別');
  const birth = toDate(get('生年月日'));
  const zipRowIdx = findLabelRow(aoa, '〒');
  const zip = zipRowIdx >= 0 ? aoa[zipRowIdx][2] : null;
  const phone = zipRowIdx >= 0 ? aoa[zipRowIdx][5] : null;
  const address = get('住所');
  const hireDate = toDate(get('入社年月日'));
  const termRowIdx = findLabelRow(aoa, '雇用期間の定め');
  const termFlag = termRowIdx >= 0 ? aoa[termRowIdx][2] : null;
  const termEnd = termRowIdx >= 0 ? toDate(aoa[termRowIdx][6]) : null;
  const job = get('職種');

  const gender = genderRaw === 1 ? '男性' : (genderRaw === 2 ? '女性' : '');
  const employType = termFlag === 'なし' ? '正社員' : '契約社員';
  let remark = '';
  if (termFlag === 'あり' && termEnd && hireDate){
    remark = `契約期間：${fmtDate(hireDate)}〜${fmtDate(termEnd)}`;
  }

  return {
    employee_no: no,
    name,
    kana: kanaHW ? hwKanaToFullWidth(kanaHW) : '',
    gender,
    birth_date: toISODate(birth),
    zip: zip ? String(zip) : null,
    phone: phone ? String(phone) : null,
    address,
    department_job: job || '',
    employment_type: employType,
    hire_date: toISODate(hireDate),
    contract_end_date: termFlag === 'あり' ? toISODate(termEnd) : null,
    remarks: remark
  };
}

const formFileInput = document.getElementById('formFile');
const uploadBtn = document.getElementById('uploadBtn');
const uploadLog = document.getElementById('uploadLog');
let pendingWB = null;

formFileInput.addEventListener('change', async () => {
  const file = formFileInput.files[0];
  uploadLog.innerHTML = '';
  if (!file){ uploadBtn.disabled = true; return; }
  const wb = new ExcelJS.Workbook();
  await wb.xlsx.load(await file.arrayBuffer());
  pendingWB = wb;
  uploadBtn.disabled = false;
});

uploadBtn.addEventListener('click', async () => {
  if (!pendingWB) return;
  uploadBtn.disabled = true;
  uploadBtn.textContent = '処理中...';

  const facility = document.getElementById('facilitySelectUpload').value;
  const warnings = [];
  const records = pendingWB.worksheets.map(s => parseEmployeeSheet(s, warnings, s.name));

  // 既存の社員番号との重複チェック
  const nos = records.map(r => r.employee_no).filter(n => n !== null && n !== undefined);
  let existingNos = new Set();
  if (nos.length){
    const { data: existing } = await sb.from('employees').select('employee_no').eq('facility', facility).in('employee_no', nos);
    if (existing) existingNos = new Set(existing.map(e => e.employee_no));
  }

  const toInsert = [];
  const skipped = [];
  records.forEach(r => {
    if (r.employee_no !== null && existingNos.has(r.employee_no)){
      skipped.push(r);
    } else {
      toInsert.push({ ...r, facility });
    }
  });

  let insertError = null;
  if (toInsert.length){
    const { error } = await sb.from('employees').insert(toInsert);
    insertError = error;
  }

  uploadBtn.disabled = false;
  uploadBtn.textContent = '反映する';

  renderUploadLog(toInsert, skipped, warnings, insertError, facility);
  if (!insertError){
    formFileInput.value = '';
    pendingWB = null;
    if (facility === currentFacility) loadRoster(currentFacility);
  }
});

function renderUploadLog(inserted, skipped, warnings, insertError, facility){
  let html = '';
  if (insertError){
    html += `<div class="log-title" style="color:var(--warn);">✗ 登録に失敗しました：${insertError.message}</div>`;
  } else {
    html += `<div class="log-title ok">✓ ${inserted.length}名を「${facility}」に登録しました</div>`;
    if (inserted.length){
      html += `<table class="result"><thead><tr><th>社員番号</th><th>氏名</th><th>職種</th><th>雇用形態</th><th>入社日</th></tr></thead><tbody>`;
      inserted.forEach(r => {
        html += `<tr><td>${r.employee_no ?? ''}</td><td>${r.name ?? ''}</td><td>${r.department_job ?? ''}</td><td>${r.employment_type ?? ''}</td><td>${fmtDate(r.hire_date)}</td></tr>`;
      });
      html += `</tbody></table>`;
    }
  }
  if (skipped.length){
    html += `<div class="log-title warn">⚠ 社員番号が既に存在するためスキップ：${skipped.map(s=>`${s.employee_no} ${s.name}`).join('、')}</div>`;
  }
  if (warnings.length){
    html += `<div class="log-title warn">⚠ 確認事項</div><ul class="warnings">`;
    warnings.forEach(w => { html += `<li>${w}</li>`; });
    html += `</ul>`;
  }
  uploadLog.innerHTML = html;
}

const QUALIFICATION_EXPIRY_KEYS = [1, 2, 3, 4].map(i => ({ nameKey:`qualification_${i}`, expiryKey:`qualification_${i}_expiry` }));

function daysUntil(dateStr){
  const target = new Date(dateStr);
  const today = new Date();
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / (1000 * 60 * 60 * 24));
}

function renderAlerts(){
  const card = document.getElementById('alertCard');
  const area = document.getElementById('alertArea');
  const active = currentEmployeesAll.filter(e => !isRetired(e));
  const items = [];
  const ALERT_WINDOW_DAYS = 90;
  const URGENT_WINDOW_DAYS = 14;

  active.forEach(e => {
    if (e.contract_end_date){
      const d = daysUntil(e.contract_end_date);
      if (d <= ALERT_WINDOW_DAYS){
        items.push({
          urgent: d <= URGENT_WINDOW_DAYS,
          text: d < 0
            ? `${e.name}さん：契約が${Math.abs(d)}日前に満了しています（${isoToSlash(e.contract_end_date)}）`
            : `${e.name}さん：契約満了まであと${d}日（${isoToSlash(e.contract_end_date)}）`
        });
      }
    }
    QUALIFICATION_EXPIRY_KEYS.forEach(({ nameKey, expiryKey }) => {
      if (e[expiryKey]){
        const d = daysUntil(e[expiryKey]);
        if (d <= ALERT_WINDOW_DAYS){
          const qName = e[nameKey] || '資格';
          items.push({
            urgent: d <= URGENT_WINDOW_DAYS,
            text: d < 0
              ? `${e.name}さん：${qName}の有効期限が${Math.abs(d)}日前に切れています（${isoToSlash(e[expiryKey])}）`
              : `${e.name}さん：${qName}の有効期限まであと${d}日（${isoToSlash(e[expiryKey])}）`
          });
        }
      }
    });
  });

  if (!items.length){
    card.classList.add('hidden');
    area.innerHTML = '';
    return;
  }
  items.sort((a,b) => (a.urgent === b.urgent) ? 0 : (a.urgent ? -1 : 1));
  card.classList.remove('hidden');
  area.innerHTML = `<ul class="alert-list">${items.map(i =>
    `<li class="${i.urgent ? 'alert-urgent' : ''}">${i.text}</li>`
  ).join('')}</ul>`;
}

  const jobOptionsSet = [...new Set(currentEmployeesAll.map(e => e.department_job).filter(Boolean))].sort();

      </select>
      <select id="employmentTypeFilterSelect">
        <option value="">雇用形態：すべて</option>
        ${empTypeOptionsSet.map(t => `<option value="${t}" ${t===employmentTypeFilter?'selected':''}>${t}</option>`).join('')}

  const toggleHtml = `<label class="show-retired-toggle">

  </label>`;

  if (!currentEmployeesAll.length){
    area.innerHTML = `<div class="empty-msg">まだ社員データがありません</div>`;
    return;
  }

  const attachFilterListeners = () => {

    });
    document.getElementById('jobFilterSelect').addEventListener('change', (e) => {

      </tr></thead>
      <tbody>${rows}</tbody>

  area.querySelectorAll('.name-link').forEach(el => {
    el.addEventListener('click', () => {
      const emp = currentEmployees.find(e => String(e.id) === el.dataset.id);
      if (emp) openModal(emp);
    });

}

function calcYears(from, to){
  if (from > to) return '';
  let y = to.getFullYear() - from.getFullYear();
  const m = to.getMonth() - from.getMonth();
  if (m < 0 || (m === 0 && to.getDate() < from.getDate())) y--;
  return y;
}
function calcTenure(from, to){
  if (from > to) return '入社前';
  let y = to.getFullYear() - from.getFullYear();
  let m = to.getMonth() - from.getMonth();
  if (to.getDate() < from.getDate()) m--;
  if (m < 0){ y--; m += 12; }
  return `${y}年${m}ヶ月`;
}

    editingSalaryHistoryId = entry.id;

  }

  if (e.target.matches('#cancelSalaryEditBtn')){
    editingSalaryHistoryId = null;
    resetSalaryForm();

  modalGridSalary.querySelectorAll('.salary-input').forEach(el => {

function escapeAttr(v){
  return String(v ?? '').replace(/"/g, '&quot;');
}

function isoToSlash(iso){
  if (!iso) return '';
  const m = String(iso).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return iso;
  return `${m[1]}/${Number(m[2])}/${Number(m[3])}`;
}

function slashToIso(slash){
  const s = String(slash).trim();
  const m = s.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})$/);
  if (!m) return null;
  const mm = String(m[2]).padStart(2, '0');
  const dd = String(m[3]).padStart(2, '0');
  return `${m[1]}-${mm}-${dd}`;
}

function renderModalField(f, employee){
  const val = employee ? (employee[f.key] ?? '') : (f.key === 'facility' ? currentFacility : '');
  if (f.type === 'select'){
    let options = f.options;
    if (f.key === 'facility'){
      const set = new Set(allowedFacilities);
      if (val) set.add(val);
      options = [...set];
    }
    const opts = options.map(o => `<option value="${o}" ${o===val?'selected':''}>${o}</option>`).join('');
    return `<div class="field"><label>${f.label}</label><select data-key="${f.key}"><option value="">-</option>${opts}</select></div>`;
  }
  if (f.type === 'textarea'){
    return `<div class="field full"><label>${f.label}</label><textarea data-key="${f.key}">${val ?? ''}</textarea></div>`;
  }
  if (f.type === 'textdate'){
    if (f.key === 'birth_date'){
      const age = val ? calcYears(new Date(val), new Date()) : '';
      return `<div class="field">
        <label>${f.label}</label>
        <div class="birthdate-row">
          <input type="text" data-key="birth_date" data-type="date" placeholder="yyyy/m/d" value="${escapeAttr(isoToSlash(val))}">
          <span class="age-display" id="birthAgeDisplay">${age !== '' ? `（${age}歳）` : ''}</span>
        </div>
      </div>`;
    }
    return `<div class="field"><label>${f.label}</label><input type="text" data-key="${f.key}" data-type="date" placeholder="yyyy/m/d" value="${escapeAttr(isoToSlash(val))}"></div>`;
  }
  return `<div class="field"><label>${f.label}</label><input type="${f.type}" data-key="${f.key}" value="${escapeAttr(val)}"></div>`;
}

function renderCertRow(index, employee){
  const path = employee ? employee[`qualification_${index}_file`] : null;
  const content = path
    ? `<span class="cert-link" data-path="${escapeAttr(path)}">📄 保存済みファイルを開く</span>
       <button type="button" class="cert-delete-btn" data-index="${index}">削除</button>`
    : `<input type="file" class="cert-file-input" data-index="${index}" accept="application/pdf,image/*">`;
  return `<div class="field full" id="certRow${index}">
    <label>資格証ファイル${index}（PDF・画像）</label>
    <div class="file-row-inline">${employee ? content : '<span class="cert-disabled-hint">社員情報を保存すると、資格証をアップロードできるようになります</span>'}</div>
  </div>`;
}

function renderQualificationPair(index, employee){
  const qKey = `qualification_${index}`;
  const dKey = `qualification_${index}_date`;
  const eKey = `qualification_${index}_expiry`;
  const currentVal = employee ? (employee[qKey] ?? '') : '';
  const dateVal = employee ? (employee[dKey] ?? '') : '';
  const expiryVal = employee ? (employee[eKey] ?? '') : '';
  const optionSet = new Set(qualificationOptions);
  if (currentVal) optionSet.add(currentVal);
  const opts = [...optionSet].sort().map(o =>
    `<option value="${escapeAttr(o)}" ${o===currentVal?'selected':''}>${o}</option>`
  ).join('');
  return `<div class="field full">
    <div class="qual-pair-grid qual-pair-grid-3">
      <div class="field">
        <label>保有資格${index}</label>
        <select data-key="${qKey}" class="qual-select">
          <option value="">-</option>
          ${opts}
          <option value="__add_new__">＋ 新しい資格を追加...</option>
        </select>
      </div>
      <div class="field">
        <label>資格取得日${index}</label>
        <input type="text" data-key="${dKey}" data-type="date" placeholder="yyyy/m/d" value="${escapeAttr(isoToSlash(dateVal))}">
      </div>
      <div class="field">
        <label>有効期限${index}（任意）</label>
        <input type="text" data-key="${eKey}" data-type="date" placeholder="yyyy/m/d" value="${escapeAttr(isoToSlash(expiryVal))}">
      </div>
    </div>
  </div>`;
}

function fmtDateTime(v){
  if (!v) return '';
  const d = new Date(v);
  if (isNaN(d)) return '';
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), day = String(d.getDate()).padStart(2,'0');
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
  return `${y}/${m}/${day} ${hh}:${mm}`;
}

function renderLastUpdatedInfo(employee){
  if (!employee || !employee.updated_at) return '';
  return `<div class="field full last-updated-info">
    最終更新：${fmtDateTime(employee.updated_at)}　更新者：${displayNameFor(employee.updated_by)}
  </div>`;
}

  modalTitle.textContent = employee ? '社員情報を編集' : '社員を新規追加';

modalGrid.addEventListener('input', (e) => {

});

modalGrid.addEventListener('change', async (e) => {
  if (e.target.matches('.qual-select')){
    if (e.target.value !== '__add_new__') return;
    const select = e.target;
    const newName = prompt('新しい資格名を入力してください');
    if (!newName || !newName.trim()){
      select.value = '';
      return;
    }
    const trimmed = newName.trim();
    if (!qualificationOptions.includes(trimmed)){
      qualificationOptions.push(trimmed);
      qualificationOptions.sort();
      const { error } = await sb.from('qualification_options').insert([{ name: trimmed }]);
      if (error && error.code !== '23505'){
        alert('資格の追加に失敗しました：' + error.message);
      }
    }
    const addNewOption = select.querySelector('option[value="__add_new__"]');
    if (![...select.options].some(o => o.value === trimmed)){
      const opt = document.createElement('option');
      opt.value = trimmed;
      opt.textContent = trimmed;
      select.insertBefore(opt, addNewOption);
    }
    select.value = trimmed;
    return;
  }
  if (!e.target.matches('.cert-file-input')) return;
  const index = e.target.dataset.index;
  const file = e.target.files[0];
  if (!file) return;
  await uploadCertificate(index, file);
});

modalGrid.addEventListener('click', async (e) => {
  const link = e.target.closest('.cert-link');
  if (link){ openCertificate(link.dataset.path); return; }
  const delBtn = e.target.closest('.cert-delete-btn');
  if (delBtn){ await deleteCertificate(delBtn.dataset.index); return; }
});

async function uploadCertificate(index, file){
  if (!currentEditId) return;
  const colKey = `qualification_${index}_file`;
  const extMatch = file.name.match(/\.([A-Za-z0-9]+)$/);
  const ext = extMatch ? extMatch[1].toLowerCase() : 'dat';
  const path = `${currentEditId}/qualification_${index}_${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('certificates').upload(path, file, { upsert:true });
  if (upErr){ alert('アップロードに失敗しました：' + upErr.message); return; }
  const { error: updErr } = await sb.from('employees').update({ [colKey]: path }).eq('id', currentEditId);
  if (updErr){ alert('データベースの更新に失敗しました：' + updErr.message); return; }
  const emp = currentEmployees.find(e => e.id === currentEditId);
  if (emp) emp[colKey] = path;
  document.getElementById(`certRow${index}`).outerHTML = renderCertRow(index, emp);
}

async function openCertificate(path){
  const { data, error } = await sb.storage.from('certificates').createSignedUrl(path, 300);
  if (error){ alert('ファイルを開けませんでした：' + error.message); return; }
  window.open(data.signedUrl, '_blank');
}

async function deleteCertificate(index){
  if (!confirm('この資格証ファイルを削除します。よろしいですか？')) return;
  const emp = currentEmployees.find(e => e.id === currentEditId);
  const colKey = `qualification_${index}_file`;
  const path = emp ? emp[colKey] : null;
  if (path){ await sb.storage.from('certificates').remove([path]); }
  const { error } = await sb.from('employees').update({ [colKey]: null }).eq('id', currentEditId);
  if (error){ alert('削除に失敗しました：' + error.message); return; }
  if (emp) emp[colKey] = null;
  document.getElementById(`certRow${index}`).outerHTML = renderCertRow(index, emp);
}

function closeModal(){

  currentEditId = null;

}

document.getElementById('addBtn').addEventListener('click', () => {

  openModal(null);
});
modalCancelBtn.addEventListener('click', closeModal);

modalSaveBtn.addEventListener('click', async () => {
  const payload = {};
  let invalidDateLabel = null;
  const allInputs = [
    ...modalGrid.querySelectorAll('[data-key]'),
    ...modalGridSalary.querySelectorAll('[data-key]')
  ];
  allInputs.forEach(el => {
    let v = el.value.trim();
    if (el.dataset.type === 'date' && v !== ''){
      const iso = slashToIso(v);
      if (!iso){
        invalidDateLabel = el.previousElementSibling ? el.previousElementSibling.textContent : el.dataset.key;
      } else {
        v = iso;
      }
    }
    payload[el.dataset.key] = (v === '') ? null : v;
  });
  if (invalidDateLabel){
    modalError.textContent = `「${invalidDateLabel}」は yyyy/m/d の形式で入力してください（例：1990/4/1）`;
    return;
  }
  if (payload.employee_no !== null) payload.employee_no = Number(payload.employee_no);
  if (!payload.facility){ modalError.textContent = '所属を選択してください'; return; }

  modalSaveBtn.disabled = true; modalSaveBtn.textContent = '保存中...';
  let error;
  if (currentEditId){
    ({ error } = await sb.from('employees').update(payload).eq('id', currentEditId));
  } else {
    ({ error } = await sb.from('employees').insert([payload]));
  }
  modalSaveBtn.disabled = false; modalSaveBtn.textContent = '保存';

  if (error){ modalError.textContent = '保存に失敗しました：' + error.message; return; }
  closeModal();
  loadRoster(currentFacility);
});

modalDeleteBtn.addEventListener('click', async () => {

  const { error } = await sb.from('employees').delete().eq('id', currentEditId);
  modalDeleteBtn.disabled = false;
  if (error){ modalError.textContent = '削除に失敗しました：' + error.message; return; }
  closeModal();
  loadRoster(currentFacility);
});

document.getElementById('exportBtn').addEventListener('click', async () => {
  const btn = document.getElementById('exportBtn');
  btn.disabled = true; btn.textContent = '作成中...';
  try{
    const wb = new ExcelJS.Workbook();
    for (const facility of allowedFacilities){
      const { data } = await sb.from('employees').select('*').eq('facility', facility).order('employee_no', { ascending:true, nullsFirst:false });
      buildFacilitySheet(wb, facility, data || []);
    }
    const buffer = await wb.xlsx.writeBuffer();
    const blob = new Blob([buffer], { type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    const today = new Date();
    const stamp = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}`;
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `社員名簿_${stamp}.xlsx`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } finally {
    btn.disabled = false; btn.textContent = 'Excelでダウンロード';
  }
});

function buildFacilitySheet(wb, facility, employees){
  const ws = wb.addWorksheet(facility);
  ws.views = [{ showGridLines:false }];

  ws.mergeCells(1, 1, 1, EXPORT_COLUMNS.length);
  const titleCell = ws.getCell(1, 1);
  titleCell.value = `社員名簿　｜　${facility}`;
  titleCell.font = { name:FONT_NAME, size:14, bold:true, color:{argb:WHITE} };
  titleCell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
  titleCell.alignment = { horizontal:'left', vertical:'middle', indent:1 };
  ws.getRow(1).height = 28;

  EXPORT_COLUMNS.forEach((col, i) => {
    const cell = ws.getCell(2, i + 1);
    cell.value = col[0];
    cell.font = { name:FONT_NAME, size:10, bold:true, color:{argb:WHITE} };
    cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:NAVY} };
    cell.alignment = { horizontal:'center', vertical:'middle', wrapText:true };
    ws.getColumn(i + 1).width = col[2];
  });
  ws.getRow(2).height = 32;

  const thin = { style:'thin', color:{argb:'FFBFBFBF'} };
  const border = { top:thin, bottom:thin, left:thin, right:thin };

  employees.forEach((emp, idx) => {
    const r = idx + 3;
    EXPORT_COLUMNS.forEach((col, i) => {
      const cell = ws.getCell(r, i + 1);
      const [, field, , type] = col;
      if (type === 's'){
        cell.value = emp[field] ?? null;
      } else if (type === 'n'){
        cell.value = emp[field] ?? null;
      } else if (type === 'd'){
        cell.value = emp[field] ? new Date(emp[field]) : null;
        cell.numFmt = 'yyyy/mm/dd';
      } else if (type === 'formula_age'){
        const birthCol = colLetterOf('生年月日');
        cell.value = { formula:`IF(${birthCol}${r}="","",DATEDIF(${birthCol}${r},TODAY(),"Y"))` };
      } else if (type === 'formula_tenure'){
        const hireCol = colLetterOf('入社日');
        const leaveCol = colLetterOf('退職日');
        cell.value = {
          formula:`IF(${hireCol}${r}="","",IF(${hireCol}${r}>TODAY(),"入社前",DATEDIF(${hireCol}${r},IF(${leaveCol}${r}="",TODAY(),${leaveCol}${r}),"Y")&"年"&DATEDIF(${hireCol}${r},IF(${leaveCol}${r}="",TODAY(),${leaveCol}${r}),"YM")&"ヶ月"))`
        };
      }
      cell.font = { name:FONT_NAME, size:10 };
      cell.alignment = { horizontal:'left', vertical:'middle' };
      cell.border = border;
      if (idx % 2 === 1){
        cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:LIGHT_BLUE} };
      }
    });
  });

  ws.views = [{ state:'frozen', ySplit:2, showGridLines:false }];
}

function colLetterOf(headerName){
  const idx = EXPORT_COLUMNS.findIndex(c => c[0] === headerName);
  let n = idx + 1; // 1-based
  let letters = '';
  while (n > 0){
    const rem = (n - 1) % 26;
    letters = String.fromCharCode(65 + rem) + letters;
    n = Math.floor((n - 1) / 26);
  }
  return letters;
}
